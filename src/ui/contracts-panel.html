<div class="float-panel" style="width: 1080px; height: 620px">
  <div class="fp-head">
    <span class="ico">◈</span>
    <span class="title">Contracts</span>
    <span class="spacer"></span>
    <button class="fp-close" id="close">×</button>
  </div>
  <div class="fp-body">
    <div class="contracts-panel">
      <div class="contracts-side">
        <div class="rank-card">
          <div class="rank-no">Rank 3</div>
          <div class="rank-rep">270 / 300 REP</div>
          <div class="rank-icon">▲</div>
          <div class="rank-bar"><div class="fill" style="width: 90%"></div></div>
        </div>
        <div class="side-link active"><span>Contracts</span><span class="num">6</span></div>
        <div class="side-link"><span>Upgrades</span></div>
        <div class="side-link"><span>Vendors</span></div>

        <div class="faction-label">Filter by faction</div>
        <div class="faction-filters">
          <button class="filter-chip active" data-faction="all">All</button>
          <button class="filter-chip" data-faction="vulcan" style="--fac: oklch(0.66 0.27 18)">Vulcan</button>
          <button class="filter-chip" data-faction="hexar" style="--fac: oklch(0.62 0.24 295)">Hexar</button>
          <button class="filter-chip" data-faction="aether" style="--fac: oklch(0.78 0.13 215)">Aether</button>
          <button class="filter-chip" data-faction="kyro" style="--fac: oklch(0.78 0.16 80)">Kyro</button>
          <button class="filter-chip" data-faction="oni" style="--fac: oklch(0.72 0.26 340)">Oni</button>
        </div>
      </div>
      <div class="contracts-list" id="contracts-list">
        <!-- populated by TS -->
      </div>
    </div>
  </div>
</div>
