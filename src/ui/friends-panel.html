<div class="float-panel" style="width: 420px; height: 580px">
  <div class="fp-head">
    <span class="ico">●</span>
    <span class="title">Social</span>
    <span class="spacer"></span>
    <button class="fp-close" id="close">×</button>
  </div>
  <div class="fp-body">
    <div class="tabs">
      <button class="tab active" data-tab="online">Online<span class="count">4</span></button>
      <button class="tab" data-tab="all">All</button>
      <button class="tab" data-tab="requests">Requests<span class="req-badge">2</span></button>
    </div>
    <div class="store-toolbar">
      <div class="search-input"><span>⊕</span><input placeholder="Search friends…" /></div>
      <button class="btn small">+ Add</button>
    </div>
    <div id="friends-content">
      <!-- populated by TS -->
    </div>
  </div>
</div>
