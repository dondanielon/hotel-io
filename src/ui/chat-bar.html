<div class="chat-zone">
  <div class="chat-log" id="chat-log">
    <div class="chat-msg system">
      <span class="ch">SYS</span>
      <span class="who">System</span>
      <span class="body">Welcome to Neon Atrium. Press ` to open the console.</span>
    </div>
  </div>
  <form class="chat-input-wrap" id="chat-form">
    <span class="chat-channel" id="chat-channel" title="Click to cycle channel">SAY</span>
    <input
      class="chat-input"
      id="chat-input"
      type="text"
      autocomplete="off"
      placeholder="Press Enter to chat…"
    />
    <button type="button" class="emoji-btn" title="Emotes">☺</button>
    <button type="submit" class="chat-send" title="Send">Send</button>
  </form>
</div>
